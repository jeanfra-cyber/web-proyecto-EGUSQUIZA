<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contacto | Jean Franco Egusquiza</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Krub:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        /* Estilos específicos para mejorar el formulario */
        .formulario-tech {
            background-color: #161616;
            padding: 4rem;
            border-radius: 15px;
            border: 1px solid #333;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            max-width: 800px;
            margin: 0 auto;
        }

        .grid-campos {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 2rem;
        }

        .campo-full { grid-column: 1 / -1; }

        .campo-item {
            display: flex;
            flex-direction: column;
            gap: 0.8rem;
        }

        .campo-item label {
            color: #FFD700;
            font-weight: 700;
            font-size: 1.4rem;
            letter-spacing: 1px;
        }

        .input-tech {
            background-color: #0a0a0a;
            border: 1px solid #444;
            color: white;
            padding: 1.2rem;
            border-radius: 5px;
            font-family: 'Krub', sans-serif;
            transition: border-color 0.3s, box-shadow 0.3s;
        }

        .input-tech:focus {
            outline: none;
            border-color: #FFD700;
            box-shadow: 0 0 10px rgba(255, 215, 0, 0.2);
        }

        .btn-enviar {
            background-color: #FFD700;
            color: black;
            border: none;
            padding: 1.5rem;
            font-weight: 900;
            text-transform: uppercase;
            cursor: pointer;
            border-radius: 5px;
            transition: all 0.3s;
            margin-top: 1rem;
        }

        .btn-enviar:hover {
            background-color: white;
            transform: scale(1.02);
        }

        .whatsapp-section {
            margin-top: 4rem;
            text-align: center;
            border-top: 1px solid #333;
            padding-top: 3rem;
        }

        .btn-wssp {
            background-color: #25d366;
            color: white;
            padding: 1.5rem 3rem;
            border-radius: 50px;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            font-weight: 700;
            transition: transform 0.3s;
            box-shadow: 0 4px 15px rgba(37, 211, 102, 0.3);
        }

        .btn-wssp:hover {
            transform: translateY(-5px);
            background-color: #1ebe57;
        }

        @media (max-width: 600px) {
            .grid-campos { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <header>
        <h1 class="header__titulo">JEAN FRANCO <span>EGUSQUIZA</span></h1>
    </header>

    <div class="barra-navegacion">
        <nav class="enlaces contenedor">
            <a href="index.html">Inicio</a>
            <a href="sobre-mi.html">Sobre Mí</a>
            <a href="clientes.html">Clientes</a>
            <a href="contactos.html">Contacto</a>
        </nav>
    </div>

    <main class="contenedor seccion-blanca">
        <h2 style="text-align: center; margin-bottom: 4rem;">_ESTABLECER_CONEXIÓN</h2>

        <div class="formulario-tech">
            <form action="#">
                <div class="grid-campos">
                    <div class="campo-item">
                        <label>// NOMBRE_USUARIO</label>
                        <input type="text" class="input-tech" placeholder="Ej. Juan Pérez" required>
                    </div>

                    <div class="campo-item">
                        <label>// CORREO_ELECTRONICO</label>
                        <input type="email" class="input-tech" placeholder="correo@ejemplo.com" required>
                    </div>

                    <div class="campo-item campo-full">
                        <label>// ASUNTO_PROYECTO</label>
                        <input type="text" class="input-tech" placeholder="¿En qué puedo ayudarte?">
                    </div>

                    <div class="campo-item campo-full">
                        <label>// MENSAJE_SISTEMA</label>
                        <textarea class="input-tech" style="height: 150px; resize: none;" placeholder="Escribe los detalles aquí..."></textarea>
                    </div>

                    <button type="submit" class="btn-enviar campo-full">EJECUTAR_ENVÍO</button>
                </div>
            </form>

            <div class="whatsapp-section">
                <p style="color: #888; margin-bottom: 1.5rem;">Respuesta inmediata vía enlace encriptado:</p>
                <a href="https://wa.me/51998806730" target="_blank" class="btn-wssp">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="currentColor" viewBox="0 0 16 16">
                        <path d="M13.601 2.326A7.854 7.854 0 0 0 7.994 0C3.627 0 .068 3.558.064 7.926c0 1.399.366 2.76 1.057 3.965L0 16l4.204-1.102a7.933 7.933 0 0 0 3.79.965h.004c4.368 0 7.926-3.558 7.93-7.93A7.898 7.898 0 0 0 13.6 2.326zM7.994 14.521a6.573 6.573 0 0 1-3.356-.92l-.24-.144-2.494.654.666-2.433-.156-.251a6.56 6.56 0 0 1-1.007-3.505c0-3.626 2.957-6.584 6.591-6.584a6.56 6.56 0 0 1 4.66 1.931 6.557 6.557 0 0 1 1.928 4.66c-.004 3.639-2.961 6.592-6.592 6.592zm3.615-4.934c-.197-.099-1.17-.578-1.353-.646-.182-.065-.315-.099-.445.099-.133.197-.513.646-.627.775-.114.133-.232.148-.43.05-.197-.1-.836-.308-1.592-.985-.59-.525-.985-1.175-1.103-1.372-.114-.198-.011-.304.088-.403.087-.088.197-.232.296-.346.1-.114.133-.198.198-.33.065-.134.034-.248-.015-.347-.05-.099-.445-1.076-.612-1.47-.16-.389-.323-.335-.445-.34-.114-.007-.247-.007-.38-.007a.729.729 0 0 0-.529.247c-.182.198-.691.677-.691 1.654 0 .977.71 1.916.81 2.049.098.133 1.394 2.132 3.383 2.992.47.205.84.326 1.129.418.475.152.904.129 1.246.08.38-.058 1.171-.48 1.338-.943.164-.464.164-.86.114-.943-.049-.084-.182-.133-.38-.232z"/>
                    </svg>
                    CONTACTAR POR WHATSAPP
                </a>
            </div>
        </div>
    </main>

    <footer class="pie-pagina">
        <p>SYSTEM_STATUS: ONLINE // JEAN FRANCO EGUSQUIZA // 2026</p>
    </footer>

    <button id="btnTop" class="btn-ir-arriba">Ir Arriba</button>
    <script src="js/script.js"></script>
</body>
</html>
